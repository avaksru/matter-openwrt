name: Build chip-tool for imx/cortexa7

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # позволяет запустить вручную

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        sdk_version: ["25.12.0"]
        target: ["imx/cortexa7"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug - check package structure
        run: |
          ls -la package/ || echo "Папки package нет!"
          ls -la package/chip-tool/ || echo "chip-tool не найден"
          cat package/chip-tool/Makefile || echo "Makefile не найден"

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: arm_cortex-a7
          TARGET: ${{ matrix.target }}
          SDK: ${{ matrix.sdk_version }}
          PACKAGES: chip-tool

      - name: Upload built ipk
        uses: actions/upload-artifact@v4
        with:
          name: chip-tool-ipk-$$   {{ matrix.sdk_version }}-   $${{ matrix.target }}
          path: bin/packages/**/chip-tool/*.ipk
          if-no-files-found: warn
