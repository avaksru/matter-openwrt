name: build matter-openwrt-build container

on:
  pull_request:
    paths:
      - .containers/matter-openwrt-build/**
      - .github/workflows/build-matter-openwrt-build.yaml
  push:
    paths:
      - .containers/matter-openwrt-build/**
      - .github/workflows/build-matter-openwrt-build.yaml
  workflow_dispatch:
    inputs:
      openwrt-version-override:
        type: string
        description: OpenWrt version number override (e.g. 24.10)
      target:
        type: choice
        description: OpenWrt target/subtarget to build for
        required: true
        default: imx/cortexa7
        options:
          - imx/cortexa7
          - mediatek/mt7622
          - ramips/mt7621
          - ipq40xx/generic
          - sunxi/cortexa7
          - bcm27xx/bcm2711
          - x86/64
          - other

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4   # лучше обновить до v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare meta-data
        id: prepare
        shell: bash
        run: |
          # OPENWRT_VERSION
          if [[ -n "${{ inputs.openwrt-version-override }}" ]]; then
            echo "OPENWRT_VERSION=${{ inputs.openwrt-version-override }}" >> "$GITHUB_ENV"
          else
            grep '^ARG OPENWRT_VERSION=' .containers/matter-openwrt-build/Dockerfile | cut -d= -f2- | tee -a "$GITHUB_ENV"
          fi

          # TARGET (fallback на imx/cortexa7 если что-то пойдёт не так)
          TARGET="${{ inputs.target || 'imx/cortexa7' }}"
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "target-slug=${TARGET//\//-}" >> "$GITHUB_ENV"   # imx/cortexa7 → imx-cortexa7

      - name: Login to GHCR
        if: github.repository_owner == 'project-chip' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: project-chip/matter-openwrt-build
          context: .containers/matter-openwrt-build
          buildargs: OPENWRT_VERSION,TARGET
          registry: ghcr.io
          tags: |
            ghcr.io/project-chip/matter-openwrt-build:${{ env.OPENWRT_VERSION }}-${{ env.target-slug }}
            ${{ (inputs.openwrt-version-override == '' && env.target-slug == 'imx-cortexa7') && 'ghcr.io/project-chip/matter-openwrt-build:latest' || '' }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          no_push: ${{ github.repository_owner != 'project-chip' || github.event_name == 'pull_request' || github.event.ref != 'refs/heads/main' }}

      - name: Extract artifacts from container
        if: always()  # даже если push не прошёл — артефакты всё равно нужны
        run: |
          set -x
          docker create --name temp-container \
            ghcr.io/project-chip/matter-openwrt-build:${{ env.OPENWRT_VERSION }}-${{ env.target-slug }}

          mkdir -p artifacts

          # Самый частый вариант — пакеты .ipk из feeds
          docker cp temp-container:/builder/bin/packages/. ./artifacts/ 2>/dev/null || true

          # Если собираются образы (sysupgrade, factory и т.д.)
          docker cp temp-container:/builder/bin/targets/${{ env.TARGET }}/. ./artifacts/images/ 2>/dev/null || true

          # Можно также взять логи, config и т.д.
          docker cp temp-container:/builder/.config ./artifacts/config-${{ env.target-slug }} 2>/dev/null || true

          docker rm temp-container

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: matter-openwrt-build-${{ env.OPENWRT_VERSION }}-${{ env.target-slug }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14