name: Build Matter Packages

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build OpenWRT with Matter
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/project-chip/matter-openwrt-build:24.10.1
          options: --volume ${{ github.workspace }}:/workspace
          shell: bash
          run: |
            set -x
            # Setup Matter feed
            echo "src-link --force matter /workspace" >> feeds.conf.default
            ./scripts/feeds update matter
            ./scripts/feeds install -a -p matter
            
            # Apply Matter config
            cat feeds/matter/.config.ci >> .config
            make defconfig
            
            # Build individual packages first
            failed=()
            for pkg in $(awk -F '[[:space:]]|/' '/^Source-Makefile:/{print$(NF-1)}' feeds/matter.index); do
              echo "::group::Building $pkg"
              if ! make -j "$(nproc)" "package/$pkg/compile"; then
                failed+=("$pkg")
                make "package/$pkg/compile" V=s || true
              fi
              echo "::endgroup::"
            done
            
            # Final package compilation and index creation
            echo "::group::Final package compilation"
            make -j "$(nproc)" package/compile
            make package/index
            echo "::endgroup::"
            
            if [[ "${#failed[@]}" -gt 0 ]]; then
              echo "ERROR: Some packages failed to build: ${failed[*]}"
              exit 2
            fi

      - name: Upload compiled packages
        uses: actions/upload-artifact@v4
        with:
          name: matter-packages
          path: ${{ github.workspace }}/bin/targets/**/packages/*
          retention-days: 5
          if-no-files-found: error
