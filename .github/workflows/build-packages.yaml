name: Build Matter Packages

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Build OpenWRT with Matter
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/project-chip/matter-openwrt-build:24.10.1
          options: --volume ${{ github.workspace }}:/workspace
          shell: bash
          run: |
            set -ex
            
            # Добавление и обновление Matter feed
            if [ ! -d "feeds/matter" ]; then
              echo "Adding Matter feed..."
              ./scripts/feeds add matter https://github.com/openwrt/packages.git^master
              ./scripts/feeds update matter
              ./scripts/feeds install -a
            fi
            
            # Проверка наличия Matter feed после добавления
            if [ ! -d "feeds/matter" ]; then
              echo "ERROR: Matter feed could not be added!"
              exit 1
            fi
            
            # Настройка конфигурации
            if [ -f "feeds/matter/.config.ci" ]; then
              echo "Using CI config from feeds/matter"
              cat feeds/matter/.config.ci > .config
            else
              echo "Using default config"
              cp feeds/matter/config.example .config
            fi
            
            make defconfig
            make -j$(nproc)
            make package/index
            
            # Проверка наличия собранных пакетов Matter
            if [ ! -d "bin/packages" ]; then
              echo "ERROR: No packages were built!"
              exit 1
            fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-packages
          path: |
            ${{ github.workspace }}/bin/targets/**/packages/*
            ${{ github.workspace }}/bin/packages/*
          retention-days: 5
          if-no-files-found: error
