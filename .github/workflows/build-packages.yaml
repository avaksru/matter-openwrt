name: Build Matter Packages

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive  # Важно для получения feeds

      - name: Build OpenWRT with Matter
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/project-chip/matter-openwrt-build:24.10.1
          options: --volume ${{ github.workspace }}:/workspace
          shell: bash
          run: |
            set -ex
            
            # Инициализация feeds
            ./scripts/feeds update -a
            ./scripts/feeds install -a
            
            # Проверка наличия Matter feed
            if [ ! -d "feeds/matter" ]; then
              echo "ERROR: Matter feed not found!"
              exit 1
            fi
            
            # Настройка конфигурации (если .config.ci отсутствует)
            if [ ! -f "feeds/matter/.config.ci" ]; then
              echo "WARNING: feeds/matter/.config.ci not found, using default config"
              make menuconfig  # Или другой способ генерации конфига
            else
              cat feeds/matter/.config.ci > .config
            fi
            
            make defconfig
            
            # Полная сборка
            make -j$(nproc)
            
            # Создание пакетов
            make package/index

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-packages
          path: |
            ${{ github.workspace }}/bin/targets/**/packages/*
            ${{ github.workspace }}/bin/packages/*
          retention-days: 5
          if-no-files-found: error
