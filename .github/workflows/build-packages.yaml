name: Build Matter Packages

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/project-chip/matter-openwrt-build:24.10.1
          options: --volume ${{ github.workspace }}:/workspace
          shell: bash
          run: |
            set -x
            echo "src-link --force matter /workspace" >> feeds.conf
            echo "src-git luci https://git.openwrt.org/project/luci.git" >> feeds.conf
            ./scripts/feeds update matter luci
            ./scripts/feeds install -a -p matter
            ./scripts/feeds install -a -p luci
            cat feeds/matter/.config.ci > .config
            make defconfig
            failed=()
            for pkg in $(awk -F '[[:space:]]|/' '/^Source-Makefile:/{print$(NF-1)}' feeds/matter.index); do
              echo "::group::Building $pkg"
              if ! make -j1 "package/$pkg/compile" V=s; then
                failed+=("$pkg")
                echo "Failed to build $pkg"
              fi
              echo "::endgroup::"
            done
            if [[ "${#failed[@]}" -gt 0 ]]; then
              echo "ERROR: Some packages failed to build: ${failed[*]}"
              exit 2
            fi
            echo "Listing compiled files:"
            ls -R /workspace/bin
      - name: Upload compiled packages
        uses: actions/upload-artifact@v4
        with:
          name: matter-packages
          path: ${{ github.workspace }}/bin/packages/**/*
          if-no-files-found: warn
